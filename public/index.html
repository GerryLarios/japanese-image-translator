<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>japanse-image-translator</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="layout">
      <section class="panel">
        <h1>japanse-image-translator</h1>
        <p class="muted">Upload a Japanese game screenshot and save structured English/Spanish study entries.</p>

        <form id="upload-form" class="upload-form">
          <label>
            <span>Name</span>
            <input type="text" name="name" placeholder="Persona 5 menu screenshot" />
          </label>

          <label>
            <span>Screenshot</span>
            <input type="file" name="image" accept="image/*" />
            <span class="muted">Choose a file or paste an image anywhere in this form.</span>
          </label>

          <label>
            <span>Pasted text</span>
            <textarea
              name="pastedText"
              rows="5"
              placeholder="Paste Japanese text copied from macOS Live Text here to skip OCR."
            ></textarea>
          </label>

          <input type="hidden" name="lesson" value="1" />

          <button type="submit">Process screenshot</button>
        </form>

        <div id="progress-panel" class="progress-panel hidden" aria-live="polite">
          <div class="progress-header">
            <strong id="progress-stage">Uploading screenshot</strong>
            <span id="progress-percent">0%</span>
          </div>
          <div class="progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
            <div id="progress-bar" class="progress-bar"></div>
          </div>
          <p id="progress-message" class="muted progress-message"></p>
        </div>

        <p id="status" class="status muted"></p>
      </section>

      <section class="panel">
        <div class="section-title">
          <h2>Latest result</h2>
          <a href="/api/entries/export" target="_blank" rel="noreferrer">Export JSON</a>
        </div>
        <div id="result" class="result muted">No screenshot processed yet.</div>
      </section>

      <section class="panel">
        <div class="section-title">
          <h2>Recent screenshots</h2>
          <button id="nuke-button" type="button" class="danger-button">Nuke all</button>
        </div>
        <div id="history" class="history muted">Nothing here yet.</div>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
